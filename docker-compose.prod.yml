version: '3.9'

services:
  # ── GIF Generation Engine (Node.js / Express + Puppeteer + FFmpeg) ──────────
  backend:
    image: muhammaddanishkhan/mermaidflow-be:latest
    container_name: mermaidflow-backend
    restart: unless-stopped
    ports:
      - '127.0.0.1:3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: https://mermaidflow.dnlabz.cloud
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
    shm_size: '1gb'
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - mermaid-network

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    image: muhammaddanishkhan/mermaidflow-fe:latest
    container_name: mermaidflow-frontend
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: '0.0.0.0'
      API_URL: http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/']
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - mermaid-network

networks:
  mermaid-network:
    driver: bridge
