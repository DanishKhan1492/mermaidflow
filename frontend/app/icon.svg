<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Top node -->
  <rect x="176" y="60" width="160" height="80" rx="16" fill="#fff" opacity="0.95"/>
  <!-- Bottom-left node -->
  <rect x="56" y="320" width="160" height="80" rx="16" fill="#fff" opacity="0.95"/>
  <!-- Bottom-right node -->
  <rect x="296" y="320" width="160" height="80" rx="16" fill="#fff" opacity="0.95"/>
  <!-- Arrow: top center → bottom-left center -->
  <line x1="230" y1="140" x2="155" y2="320" stroke="url(#arrow)" stroke-width="12" stroke-linecap="round"/>
  <polygon points="145,308 165,332 155,320" fill="#2dd4bf"/>
  <!-- Arrow: top center → bottom-right center -->
  <line x1="282" y1="140" x2="357" y2="320" stroke="url(#arrow)" stroke-width="12" stroke-linecap="round"/>
  <polygon points="367,308 347,332 357,320" fill="#2dd4bf"/>
  <!-- Play/animate triangle in center -->
  <polygon points="232,210 232,270 280,240" fill="#fff" opacity="0.9"/>
  <!-- GIF badge -->
  <rect x="352" y="420" width="110" height="48" rx="12" fill="#f59e0b"/>
  <text x="407" y="452" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="28" fill="#fff">GIF</text>
</svg>
